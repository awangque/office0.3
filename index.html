<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v0.0.2</title>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbzi8vr_Rll2LUM9rcTLz4gpz4CZ4ER_HSRguEqzib0tYI-sBe54yF9E5kGBZF6UGd-p/exec" width="100%" height="100%" allowfullscreen="true" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;"></iframe>
    <script>
        window.onload = function() {
            document.querySelector('iframe').requestFullscreen().catch((err) => {
                console.error(`Error attempting to enable full-screen mode: ${err.message}`);
            });
        };
    </script>
</body>
</html>
